name: Generate Space Invader Graph

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: space-invader-graph
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate Pacman SVG
    timeout-minutes: 10
    steps:
      - name: Generate pacman graph
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: Tusharika725

      - name: Push pacman graph to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
