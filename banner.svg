<svg xmlns="http://www.w3.org/2000/svg" width="854" height="240" style="z-index:1;position:relative" viewBox="0 0 854 240">
  <style>
    .text { 
        font-size: 64px; 
        font-weight: 700; 
        font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif; 
    }
    .desc { 
        font-size: 20px; 
        font-weight: 500; 
        font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif; 
    }
    .text, .desc { animation: fadeIn 1.2s ease-in-out forwards; }
    @keyframes fadeIn { 
        from { opacity: 0; } 
        to { opacity: 1; } 
    }
  </style>
  
  <defs>
    <linearGradient id="javaSpringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6DB33F"/>
      <stop offset="100%" stop-color="#ED8B00"/>
    </linearGradient>
  </defs>

  <g transform="translate(427, 120)">
    <circle cx="0" cy="-10" r="85" fill="url(#javaSpringGradient)" opacity="0.85"/>
  </g>

  <text text-anchor="middle" alignment-baseline="middle" x="50%" y="45%" class="text" style="fill:#FFFFFF;" stroke="#000000" stroke-width="1">
    Tusharika Srivastava
  </text>

  <text text-anchor="middle" alignment-baseline="middle" x="50%" y="70%" class="desc" style="fill:#A1AAB3;">
    Backend Software Engineer | Java &amp; Spring Boot Specialist
  </text>
</svg>
